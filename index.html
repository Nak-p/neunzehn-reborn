<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>NEUNZEHN REBORN</title>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: monospace;
      color: #eee;
    }
    h1 {
      margin-bottom: 8px;
      letter-spacing: 4px;
      font-size: 1.4rem;
      color: #a0c4ff;
    }
    #turn-info {
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: #ffd6a5;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(8, 64px);
      grid-template-rows: repeat(8, 64px);
      gap: 2px;
    }
    .cell {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      border-radius: 4px;
      position: relative;
      transition: filter 0.15s;
      user-select: none;
      box-sizing: border-box;
    }
    .cell:hover { filter: brightness(1.3); }
    .grass    { background: #4a7c59; }
    .water    { background: #2e6fa3; }
    .mountain { background: #6b5b45; }
    .sand     { background: #c9a84c; }

    /* ユニット */
    .unit-marker {
      position: absolute;
      top: 2px; left: 2px; right: 2px; bottom: 2px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      border: 3px solid transparent;
      pointer-events: none;
    }
    .team-0 .unit-marker { background: rgba(100,180,255,0.85); border-color: #4fc3f7; }
    .team-1 .unit-marker { background: rgba(255,120,120,0.85); border-color: #e57373; }
    .team-2 .unit-marker { background: rgba(120,220,120,0.85); border-color: #66bb6a; }
    .team-3 .unit-marker { background: rgba(255,200,80,0.85);  border-color: #ffd54f; }

    /* 選択中 */
    .selected { outline: 3px solid #fff; outline-offset: -3px; }

    /* 移動可能ハイライト */
    .movable { outline: 3px solid #fff700; outline-offset: -3px; filter: brightness(1.2); }

    /* 移動済み */
    .moved .unit-marker { opacity: 0.45; }

    #log {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #aaa;
      height: 1.2em;
    }
    #end-turn-btn {
      margin-top: 14px;
      padding: 8px 28px;
      background: #3a3a6a;
      color: #a0c4ff;
      border: 2px solid #a0c4ff;
      border-radius: 6px;
      font-family: monospace;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 2px;
    }
    #end-turn-btn:hover { background: #5050a0; }
  </style>
</head>
<body>
  <h1>NEUNZEHN REBORN</h1>
  <div id="turn-info">Turn 1 — 青（🧝）の番</div>
  <div id="grid"></div>
  <div id="log"></div>
  <button id="end-turn-btn">END TURN</button>

  <script>
    // ---- 地形 ----
    const TERRAINS = [
      { type: 'grass',    emoji: '🌿' },
      { type: 'water',    emoji: '🌊' },
      { type: 'mountain', emoji: '⛰️' },
      { type: 'sand',     emoji: '🏜️' },
    ];

    // ---- ユニット初期配置（4隅） ----
    const UNITS = [
      { id: 0, team: 0, emoji: '🧝', row: 0, col: 0 },
      { id: 1, team: 1, emoji: '🧙', row: 0, col: 7 },
      { id: 2, team: 2, emoji: '🧜', row: 7, col: 0 },
      { id: 3, team: 3, emoji: '🐉', row: 7, col: 7 },
    ];

    const TEAM_NAMES = ['青', '赤', '緑', '黄'];

    // 時計回り: 左上→右上→右下→左下 (team 0→1→3→2)
    const TURN_ORDER = [0, 1, 3, 2];
    let turnOrderIdx = 0;
    function currentTeam() { return TURN_ORDER[turnOrderIdx]; }

    let mapData = [];
    let selectedUnit = null;
    let turn = 1;

    const gridEl    = document.getElementById('grid');
    const logEl     = document.getElementById('log');
    const turnInfoEl = document.getElementById('turn-info');
    const endTurnBtn = document.getElementById('end-turn-btn');

    // ---- マップ生成（4象限固定）----
    // 左上:草原 / 右上:水 / 左下:山 / 右下:砂
    const QUADRANT_TERRAIN = [
      [TERRAINS[0], TERRAINS[1]], // row上半分: [左=草原, 右=水]
      [TERRAINS[2], TERRAINS[3]], // row下半分: [左=山,   右=砂]
    ];
    for (let r = 0; r < 8; r++) {
      mapData[r] = [];
      for (let c = 0; c < 8; c++) {
        const qRow = r < 4 ? 0 : 1;
        const qCol = c < 4 ? 0 : 1;
        mapData[r][c] = QUADRANT_TERRAIN[qRow][qCol];
      }
    }

    // ---- ユニット検索 ----
    function unitAt(row, col) {
      return UNITS.find(u => u.row === row && u.col === col) || null;
    }

    // ---- グリッド描画 ----
    function render() {
      gridEl.innerHTML = '';
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const terrain = mapData[r][c];
          const unit    = unitAt(r, c);

          const cell = document.createElement('div');
          cell.className = `cell ${terrain.type}`;
          cell.dataset.row = r;
          cell.dataset.col = c;
          cell.textContent = terrain.emoji;

          // ユニットがいる場合
          if (unit) {
            cell.classList.add(`team-${unit.team}`);
  
            const marker = document.createElement('div');
            marker.className = 'unit-marker';
            marker.textContent = unit.emoji;
            cell.appendChild(marker);
          }

          // 選択中
          if (selectedUnit && selectedUnit.row === r && selectedUnit.col === c) {
            cell.classList.add('selected');
          }

          // 移動可能ハイライト
          if (selectedUnit && isMovable(r, c)) {
            cell.classList.add('movable');
          }

          cell.addEventListener('click', () => onCellClick(r, c));
          gridEl.appendChild(cell);
        }
      }
    }

    // ---- マンハッタン距離2以内 & 空きマス ----
    function isMovable(row, col) {
      if (!selectedUnit) return false;
      const dist = Math.abs(row - selectedUnit.row) + Math.abs(col - selectedUnit.col);
      return dist === 1 && !unitAt(row, col);
    }

    // ---- クリック処理 ----
    function onCellClick(row, col) {
      const clickedUnit = unitAt(row, col);

      // 移動先をクリック → 移動後に次のチームへ
      if (selectedUnit && isMovable(row, col)) {
        logEl.textContent = `Turn ${turn}: ${TEAM_NAMES[selectedUnit.team]}（${selectedUnit.emoji}）が (${selectedUnit.col},${selectedUnit.row}) → (${col},${row}) へ移動`;
        selectedUnit.row = row;
        selectedUnit.col = col;
        selectedUnit = null;
        turnOrderIdx = (turnOrderIdx + 1) % TURN_ORDER.length;
        if (turnOrderIdx === 0) turn++;
        turnInfoEl.textContent = `Turn ${turn} — ${TEAM_NAMES[currentTeam()]}（${UNITS.find(u=>u.team===currentTeam()).emoji}）の番`;
        render();
        return;
      }

      // ユニットを選択（現在のチームのみ）
      if (clickedUnit) {
        if (clickedUnit.team !== currentTeam()) {
          logEl.textContent = `今は ${TEAM_NAMES[currentTeam()]} の番です`;
          render();
          return;
        }
        selectedUnit = clickedUnit;
        logEl.textContent = `${TEAM_NAMES[clickedUnit.team]}（${clickedUnit.emoji}）を選択 — 移動先をクリック`;
        render();
        return;
      }

      // 空マスをクリック（選択解除）
      selectedUnit = null;
      logEl.textContent = '';
      render();
    }

    // END TURNボタンは不使用（1移動=1ターン自動進行）
    endTurnBtn.style.display = 'none';

    render();
  </script>
</body>
</html>
